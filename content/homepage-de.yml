hero_label: "Führung · Embodiment · Integration"
hero_title: "The Integration<br>Studio"
hero_tagline: "Less performance. More reality."
hero_description: "Ein Raum, in dem innere Entwicklung greifbar wird — sichtbar in Klarheit, Präsenz und authentischem Ausdruck in der Außenwelt."
intro_heading: "Entwicklung, die nicht nur im Kopf passiert"
intro_p1: "The Integration Studio ist ein Raum für Menschen, die nicht nur verstehen, sondern Veränderung auch wirklich verkörpern wollen — in ihrer Führung, in ihrer Präsenz, in ihrer Beziehung zu sich selbst und zu anderen."
intro_p2: "Im Kern geht es um Integration: von Innenwelt und Außenwirkung, von Klarheit und Gefühl, von Körper und Bewusstsein."
