page_title: "Für Organisationen"
hero_heading: "Führung, die wirkt.<br>Von innen nach außen."
hero_description: "Leadership Coaching, Team-Workshops und Begleitung für Organisationen, die echten Wandel wollen — nicht nur an der Oberfläche."
intro_text: "Führung beginnt innen. Die Fähigkeit, Menschen zu bewegen, Klarheit zu schaffen und Veränderung wirklich zu gestalten, entsteht nicht durch mehr Tools und Frameworks — sondern durch echte innere Arbeit."
