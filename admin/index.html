<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager - The Integration Studio</title>
  <script>
    // Debug: Log all postMessage events received
    window.addEventListener('message', function(event) {
      console.log('🔔 Message received in CMS window:', {
        data: event.data,
        origin: event.origin,
        source: event.source ? 'popup' : 'unknown'
      });
    }, false);

    console.log('✅ Message listener added to CMS window');
  </script>
</head>
<body>
  <!-- Include Sveltia CMS - modern alternative to Decap CMS with better OAuth support -->
  <script type="module" src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
